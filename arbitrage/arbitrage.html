<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>BSC Arbitrage Monitor</title>
<style>
:root {
  --bg: #080b14;
  --panel: #0d1120;
  --border: #1a2040;
  --accent: #00f5c4;
  --accent2: #7c6fff;
  --red: #ff4560;
  --yellow: #ffd166;
  --text: #c8d6f0;
  --muted: #4a5580;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

.layout { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; gap: 0; height: 100vh; }
.sidebar { grid-row: 1 / 3; background: var(--panel); border-right: 1px solid var(--border); padding: 28px 20px; display: flex; flex-direction: column; gap: 20px; }
.topbar  { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
.main    { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

.logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(0,245,196,.4); }
.logo span { color: var(--accent2); }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.field input, .field select {
  background: #0a0e1c; border: 1px solid var(--border); color: var(--text);
  padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 13px;
  transition: border-color .2s;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,245,196,.1); }
.field select option { background: #0d1120; }

.btn-start {
  width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: bold; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #080b14; transition: opacity .2s, transform .1s;
}
.btn-start:hover { opacity: .9; transform: translateY(-1px); }
.btn-start:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.btn-stop {
  width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 13px; background: transparent;
  color: var(--muted); transition: border-color .2s, color .2s;
}
.btn-stop:hover { border-color: var(--red); color: var(--red); }

.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { font-size: 12px; color: var(--muted); }
.status-text.live { color: var(--accent); }

.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity .3s;
}
.card.active::before { opacity: 1; }
.c-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.c-val { font-size: 22px; font-weight: bold; color: var(--accent); }
.c-val.red { color: var(--red); }
.c-val.green { color: var(--accent); }
.c-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.price-bar {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 20px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.price-item { display: flex; flex-direction: column; gap: 4px; }
.price-item .p-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.price-item .p-val { font-size: 16px; color: var(--text); }
.price-divider { width: 1px; height: 36px; background: var(--border); }
.spread { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.spread .p-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.spread-val { font-size: 20px; font-weight: bold; }
.spread-val.pos { color: var(--accent); text-shadow: 0 0 12px rgba(0,245,196,.3); }
.spread-val.neg { color: var(--red); }

.log-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; flex: 1; min-height: 0; display: flex; flex-direction: column; }
.log-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.log-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; font-family: inherit; }
.log-clear:hover { color: var(--text); }
#log { padding: 12px 16px; overflow-y: auto; flex: 1; font-size: 12px; line-height: 1.9; }
.l-info  { color: var(--muted); }
.l-price { color: #5b8fd4; }
.l-arb   { color: var(--yellow); }
.l-done  { color: var(--accent); font-weight: bold; }
.l-fail  { color: var(--red); }
.l-hash  { color: var(--accent2); text-decoration: underline; cursor: pointer; }
.l-hash:hover { color: #a89fff; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.2/ethers.umd.min.js"></script>
</head>
<body>
<div class="layout">

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="logo">ARB<span>BOT</span></div>

    <div style="padding: 12px; background: #0a0e1c; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--muted); text-align: center;">
      <div style="margin-bottom: 6px;">钱包状态</div>
      <div id="walletStatus" style="color: var(--accent); font-weight: bold;">未连接</div>
    </div>

    <div class="field">
      <label>监控代币</label>
      <select id="tokenSelect"></select>
    </div>

    <div class="field">
      <label>最大投入 USDT（上限）</label>
      <input id="amountIn" value="100" />
    </div>

    <div class="field">
      <label>最小利润 USDT</label>
      <input id="minProfit" value="0.1" />
    </div>

    <div class="field">
      <label>BSC RPC</label>
      <input id="rpc" value="https://bsc.blockrazor.xyz" />
    </div>

    <button class="btn-start" id="btnStart">▶ 开始监控</button>
    <button class="btn-stop"  id="btnStop">■ 停止</button>
    <button class="btn-stop" onclick="location.href='token-management.html'" style="border-color: var(--muted); color: var(--muted); margin-top: auto;">→ 创建代币</button>
  </aside>

  <!-- topbar -->
  <header class="topbar">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">未连接</span>
  </header>

  <!-- main -->
  <main class="main">
    <div class="cards">
      <div class="card" id="cardPancake">
        <div class="c-label">Pancake 价格</div>
        <div class="c-val" id="sPancake">--</div>
        <div class="c-sub" id="sPancakeSub">USDT / TOKEN</div>
      </div>
      <div class="card" id="cardUniswap">
        <div class="c-label">Uniswap 价格</div>
        <div class="c-val" id="sUniswap">--</div>
        <div class="c-sub" id="sUniswapSub">USDT / TOKEN</div>
      </div>
      <div class="card" id="cardCount">
        <div class="c-label">套利次数</div>
        <div class="c-val" id="sCount">0</div>
        <div class="c-sub">累计</div>
      </div>
      <div class="card" id="cardProfit">
        <div class="c-label">累计利润</div>
        <div class="c-val green" id="sTotal">0.00000000</div>
        <div class="c-sub">USDT</div>
      </div>
      <div class="card" id="cardTokenCount">
        <div class="c-label">代币套利次数</div>
        <div class="c-val" id="sTokenCount">0</div>
        <div class="c-sub">选定代币</div>
      </div>
      <div class="card" id="cardTokenProfit">
        <div class="c-label">代币累计利润</div>
        <div class="c-val green" id="sTokenTotal">0.00000000</div>
        <div class="c-sub">USDT</div>
      </div>
    </div>

    <div class="price-bar" id="priceBar">
      <div class="price-item">
        <div class="p-label">P→U 利润</div>
        <div class="p-val" id="sProfit0">--</div>
      </div>
      <div class="price-divider"></div>
      <div class="price-item">
        <div class="p-label">U→P 利润</div>
        <div class="p-val" id="sProfit1">--</div>
      </div>
      <div class="spread">
        <div class="p-label">最优利润</div>
        <div class="spread-val" id="sBest">--</div>
      </div>
    </div>

    <div class="log-wrap">
      <div class="log-header">
        <span>实时日志</span>
        <button class="log-clear" onclick="document.getElementById('log').innerHTML=''">清空</button>
      </div>
      <div id="log"></div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.2/ethers.umd.min.js"></script>
<script src="wallet.js"></script>
<script src="wallet-modal.js"></script>
<script>
let ws, arbCount = 0, totalProfit = 0, importedKey = '';

function updateWalletStatus() {
  if (wallet.isConnected()) {
    const addr = wallet.getAddress().slice(0,6) + '...' + wallet.getAddress().slice(-4);
    document.getElementById('walletStatus').textContent = addr;
    document.getElementById('walletStatus').style.color = 'var(--accent)';
    importedKey = wallet.getPrivateKey();
    fetch(`/stats/${wallet.getAddress()}`).then(r => r.json()).then(s => {
      arbCount = s.count;
      totalProfit = s.total;
      document.getElementById('sCount').textContent = arbCount;
      document.getElementById('sTotal').textContent = totalProfit.toFixed(8);
    });
    loadTokenStats();
  } else {
    document.getElementById('walletStatus').textContent = '未连接';
    document.getElementById('walletStatus').style.color = 'var(--muted)';
  }
}

async function loadTokenStats() {
  const token = document.getElementById('tokenSelect').value;
  if (!token || !wallet.isConnected()) return;
  try {
    const res = await fetch(`/stats/${wallet.getAddress()}/${token}`);
    const s = await res.json();
    document.getElementById('sTokenCount').textContent = s.count;
    document.getElementById('sTokenTotal').textContent = s.total.toFixed(8);
  } catch (e) {
    console.error('Failed to load token stats:', e);
  }
}

updateWalletStatus();

async function loadUserTokens() {
  if (!wallet.isConnected()) return;
  try {
    const FACTORY_ADDR = '0xDa2523c0f830d0809E0c2Af02F00FfD3117830e3';
    const FACTORY_ABI = ['function getUserTokens(address user) external view returns (address[])'];
    const TOKEN_ABI = ['function name() external view returns (string)'];
    const provider = new ethers.JsonRpcProvider('https://bsc.blockrazor.xyz');
    const factory = new ethers.Contract(FACTORY_ADDR, FACTORY_ABI, provider);
    const tokens = await factory.getUserTokens(wallet.getAddress());
    const sel = document.getElementById('tokenSelect');
    sel.innerHTML = '';
    for (const t of tokens) {
      try {
        const token = new ethers.Contract(t, TOKEN_ABI, provider);
        const name = await token.name();
        const o = document.createElement('option');
        o.value = t;
        o.textContent = name;
        sel.appendChild(o);
      } catch {
        const o = document.createElement('option');
        o.value = t;
        o.textContent = t.slice(0, 10) + '...';
        sel.appendChild(o);
      }
    }
    loadTokenStats();
  } catch (e) {
    console.error('Failed to load tokens:', e);
  }
}

loadUserTokens();

document.getElementById('tokenSelect').addEventListener('change', loadTokenStats);

function setLive(on) {
  document.getElementById('dot').className = 'dot' + (on ? ' live' : '');
  const st = document.getElementById('statusText');
  st.textContent = on ? '监控中' : '未连接';
  st.className = 'status-text' + (on ? ' live' : '');
  document.getElementById('btnStart').disabled = on;
}

function log(cls, html) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  el.innerHTML += `<div class="l-${cls}">[${ts}] ${html}</div>`;
  el.scrollTop = el.scrollHeight;
}

function fmtProfit(val) {
  const n = parseFloat(val);
  const s = (n >= 0 ? '+' : '') + n.toFixed(8);
  return `<span style="color:${n > 0 ? 'var(--accent)' : 'var(--red)'}">${s}</span>`;
}

function setProfitEl(id, val) {
  const el = document.getElementById(id);
  const n = parseFloat(val);
  el.innerHTML = (n >= 0 ? '+' : '') + n.toFixed(8) + ' USDT';
  el.style.color = n > 0 ? 'var(--accent)' : 'var(--red)';
}

document.getElementById('btnStart').onclick = () => {
  if (ws) ws.close();
  ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: 'start',
      config: {
        walletAddress: wallet.getAddress(),
        tokenOut:   document.getElementById('tokenSelect').value,
        maxAmountIn: document.getElementById('amountIn').value.trim(),
        minProfit:   document.getElementById('minProfit').value.trim(),
        pollMs:     3000,
        rpc:        document.getElementById('rpc').value.trim(),
      }
    }));
    setLive(true);
    arbCount = 0; totalProfit = 0;
    document.getElementById('sCount').textContent = '0';
    document.getElementById('sTotal').textContent = '0.00000000';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'price') {
      document.getElementById('sPancake').textContent = parseFloat(msg.pancakePrice).toFixed(6);
      document.getElementById('sUniswap').textContent = parseFloat(msg.uniswapPrice).toFixed(6);
      document.getElementById('sPancakeSub').textContent = `USDT / ${msg.tokenOutSymbol}`;
      document.getElementById('sUniswapSub').textContent = `USDT / ${msg.tokenOutSymbol}`;
      setProfitEl('sProfit0', msg.profit0);
      setProfitEl('sProfit1', msg.profit1);
      const best = Math.max(parseFloat(msg.profit0), parseFloat(msg.profit1));
      const bEl = document.getElementById('sBest');
      bEl.textContent = (best >= 0 ? '+' : '') + best.toFixed(8) + ' USDT';
      bEl.className = 'spread-val ' + (best > 0 ? 'pos' : 'neg');
      ['cardPancake','cardUniswap'].forEach(id => document.getElementById(id).classList.add('active'));
      log('price', `Pancake: ${parseFloat(msg.pancakePrice).toFixed(6)} | Uniswap: ${parseFloat(msg.uniswapPrice).toFixed(6)} | P→U: ${fmtProfit(msg.profit0)} | U→P: ${fmtProfit(msg.profit1)} USDT`);
    }
    else if (msg.type === 'arb_signal') {
      log('arb', `⚡ 发现价差！${msg.direction} 最优投入 ${parseFloat(msg.optimalIn).toFixed(8)} USDT 预期利润 ${fmtProfit(msg.profit)} USDT — 前端执行交易中...`);
      executeArbitrage(msg);
    }
    else if (msg.type === 'info') {
      log('info', msg.msg);
    }
    else if (msg.type === 'error') {
      log('fail', `⚠ ${msg.msg}`);
    }
  };

  ws.onclose = () => setLive(false);
};

async function executeArbitrage(signal) {
  try {
    const provider = new ethers.JsonRpcProvider(document.getElementById('rpc').value.trim());
    const signer = new ethers.Wallet(importedKey, provider);
    const arb = new ethers.Contract('0x90fdaAeeecc83100c88e34785c5217C8f3E60CBf',
      ['function arbitrage(address tokenIn, address tokenOut, uint256 amountIn, uint256 minProfit, bool buyOnPancake) external'],
      signer);

    const minProfit = ethers.parseUnits(document.getElementById('minProfit').value.trim(), 18);
    const tx = await arb.arbitrage('0x55d398326f99059fF775485246999027B3197955', signal.tokenOut, signal.amountIn, minProfit, signal.buyOnPancake);
    log('arb', `📤 已广播 → <span class="l-hash" onclick="window.open('https://bscscan.com/tx/${tx.hash}')">${tx.hash}</span>`);

    const receipt = await tx.wait();
    arbCount++;
    totalProfit += parseFloat(signal.profit);
    document.getElementById('sCount').textContent = arbCount;
    document.getElementById('sTotal').textContent = totalProfit.toFixed(8);
    document.getElementById('cardCount').classList.add('active');
    document.getElementById('cardProfit').classList.add('active');
    log('done', `✅ 套利成功！利润 ${fmtProfit(signal.profit)} USDT | Gas: ${receipt.gasUsed.toString()} | <span class="l-hash" onclick="window.open('https://bscscan.com/tx/${receipt.hash}')">${receipt.hash}</span>`);

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: 'arb_done',
        walletAddress: wallet.getAddress(),
        hash: receipt.hash,
        profit: signal.profit,
        gasUsed: receipt.gasUsed.toString(),
        tokenOut: signal.tokenOut,
        direction: signal.direction,
      }));
    }

    setTimeout(() => {
      updateWalletStatus();
      loadTokenStats();
    }, 1000);
  } catch (e) {
    log('fail', `❌ 套利失败：${e.message}`);
  }
}

document.getElementById('btnStop').onclick = () => {
  ws.onclose = () => setLive(false);
  if (ws) { ws.send(JSON.stringify({ type: 'stop' })); ws.close(); }
};
</script>
</body>
</html>
