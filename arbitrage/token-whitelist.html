<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Manage Whitelist</title>
  <style>
    :root {
      --bg: #080b14;
      --panel: #0d1120;
      --border: #1a2040;
      --accent: #00f5c4;
      --accent2: #7c6fff;
      --red: #ff4560;
      --text: #c8d6f0;
      --muted: #4a5580;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }
    .layout { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; gap: 0; height: 100vh; }
    .sidebar { grid-row: 1 / 3; background: var(--panel); border-right: 1px solid var(--border); padding: 28px 20px; display: flex; flex-direction: column; gap: 20px; }
    .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .main { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(0,245,196,.4); }
    .logo span { color: var(--accent2); }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .field input, .field textarea {
      background: #0a0e1c; border: 1px solid var(--border); color: var(--text);
      padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 13px;
      transition: border-color .2s;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,245,196,.1); }
    .btn-submit {
      width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: bold; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #080b14; transition: opacity .2s, transform .1s;
    }
    .btn-submit:hover { opacity: .9; transform: translateY(-1px); }
    .btn-back {
      width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 13px; background: transparent;
      color: var(--muted); transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .section {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .section::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0.5;
    }
    .section h2 { font-size: 14px; color: var(--accent); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; }
    .list { display: flex; flex-direction: column; gap: 8px; }
    .list-item {
      background: #0a0e1c; border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; font-size: 12px; word-break: break-all;
    }
    .list-item:hover { border-color: var(--accent); }
    .empty { text-align: center; color: var(--muted); padding: 20px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">ARB<span>BOT</span></div>

      <div class="field">
        <label>Token Address</label>
        <input id="tokenAddr" placeholder="0x..." />
      </div>

      <div class="field">
        <label>Whitelist Addresses</label>
        <textarea id="whitelistAddrs" placeholder="0x..., 0x..., 0x..." style="min-height: 100px;"></textarea>
      </div>

      <button class="btn-submit" onclick="addToWhitelist()">▶ ADD WHITELIST</button>
      <button class="btn-back" onclick="location.href='index.html'">← BACK</button>
    </aside>

    <header class="topbar">
      <span style="font-size: 14px; color: var(--muted);">Whitelist Management</span>
    </header>

    <main class="main">
      <div class="section">
        <h2>📝 Status</h2>
        <div id="status" style="font-size: 12px; color: var(--muted); line-height: 1.8;">
          Ready to manage whitelists
        </div>
      </div>
    </main>
  </div>

  <script>
    function log(msg) {
      const el = document.getElementById('status');
      const ts = new Date().toLocaleTimeString();
      el.innerHTML += `<div>[${ts}] ${msg}</div>`;
    }

    window.addToWhitelist = async () => {
      const token = document.getElementById('tokenAddr').value.trim();
      const addrs = document.getElementById('whitelistAddrs').value.split(',').map(a => a.trim()).filter(a => a);

      if (!token || !addrs.length) {
        alert('Fill all fields');
        return;
      }

      try {
        log(`Adding ${addrs.length} addresses to whitelist...`);
        const response = await fetch('/api/add-whitelist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, addresses: addrs })
        });
        const result = await response.json();
        log(`✓ Whitelist updated`);
        document.getElementById('whitelistAddrs').value = '';
      } catch (error) {
        log(`✗ Error: ${error.message}`);
      }
    };
  </script>
</body>
</html>
