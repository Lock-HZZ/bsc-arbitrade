<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>BSC Arbitrage - Dashboard</title>
  <style>
    :root {
      --bg: #080b14;
      --panel: #0d1120;
      --border: #1a2040;
      --accent: #00f5c4;
      --accent2: #7c6fff;
      --red: #ff4560;
      --text: #c8d6f0;
      --muted: #4a5580;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 20px rgba(0,245,196,.4); margin-bottom: 50px; text-align: center; }
    .logo span { color: var(--accent2); }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 30px; cursor: pointer; transition: all .3s; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0; transition: opacity .3s;
    }
    .card:hover { transform: translateY(-8px); border-color: var(--accent); }
    .card:hover::before { opacity: 1; }
    .card a { text-decoration: none; color: inherit; display: block; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .card h2 { font-size: 18px; color: var(--accent); margin-bottom: 12px; letter-spacing: 1px; }
    .card p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ARB<span>BOT</span></div>

    <div style="background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 40px; text-align: center;">
      <div id="globalAddr" style="font-size: 13px; color: var(--accent); padding: 10px;">未连接</div>
    </div>

    <div class="cards">
      <div class="card">
        <a href="arbitrage.html">
          <div class="icon"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></div>
          <h2>ARBITRAGE MONITOR</h2>
          <p>实时监控 Pancake 和 Uniswap 的价格差异，自动发现并执行套利交易机会</p>
        </a>
      </div>

      <div class="card">
        <a href="token-management.html">
          <div class="icon"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"></path></svg></div>
          <h2>TOKEN MANAGEMENT</h2>
          <p>创建代币、加载已创建的代币、管理购买白名单</p>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.2/ethers.umd.min.js"></script>
  <script src="wallet.js"></script>
  <script src="wallet-modal.js"></script>
  <script>
    function updateWalletDisplay() {
      const addr = document.getElementById('globalAddr');
      if (wallet.isConnected()) {
        addr.textContent = wallet.getAddress().slice(0,6) + '...' + wallet.getAddress().slice(-4);
        addr.style.color = 'var(--accent)';
      } else {
        addr.textContent = '未连接';
        addr.style.color = 'var(--muted)';
      }
    }

    updateWalletDisplay();
  </script>
</body>
</html>
